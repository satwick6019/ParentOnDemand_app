{% extends 'base.html' %}

{% block content %}

<nav class="w-full px-8 py-4 flex justify-between items-center bg-white shadow-sm">
    <h1 class="text-xl font-semibold">ParentOnDemand</h1>

    <div class="flex gap-6 text-sm text-gray-600">
        <a href="/" class="hover:text-black">Home</a>
        <a href="/login/" class="hover:text-black">Sign in</a>
    </div>
</nav>

<div class="min-h-[85vh] flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">

        <h2 class="text-2xl font-semibold mb-6 text-center">Create account</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username"
                class="w-full mb-4 px-4 py-2 border rounded-md">

            <input type="email" name="email" placeholder="Email"
                class="w-full mb-4 px-4 py-2 border rounded-md">

            <input type="text" name="phone" placeholder="Phone Number"
                class="w-full mb-4 px-4 py-2 border rounded-md">

            <input type="password" name="password" placeholder="Password"
                class="w-full mb-4 px-4 py-2 border rounded-md">

            <select name="role" class="w-full mb-6 px-4 py-2 border rounded-md">
                <option value="student">Student</option>
                <option value="parent">Parent</option>
            </select>

            <button type="submit"
                class="w-full py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
                Register
            </button>
        </form>

    </div>

</div>

{% endblock %}

{% comment %} <h2>Register</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Username"><br><br>
    <input type="email" name="email" placeholder="Email"><br><br>
    <input type="text" name="phone" placeholder="Phone Number"><br><br>
    <input type="password" name="password" placeholder="Password"><br><br>

    <select name="role">
        <option value="student">Student</option>
        <option value="parent">Parent</option>
    </select><br><br>
    

    <button type="submit">Register</button>
    {% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}
</form> {% endcomment %}
